name: Token validation

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  token-validation:
    name: Token validation
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: contracts/package-lock.json

      - name: Install contracts dependencies
        working-directory: contracts
        run: npm ci

      - name: Run contracts tests
        working-directory: contracts
        run: npm test

      - name: Compile contracts
        working-directory: contracts
        run: npm run compile

      - name: Run targeted FunkyRave tests
        working-directory: contracts
        run: npx hardhat test test/FunkyRave.test.js

      - name: Validate testnet preflight owner values sample
        run: node scripts/validate-testnet-preflight-values.js test/testnet-preflight-values.sample.json

      - name: Run testnet preflight owner values validator self-tests
        run: node scripts/test-testnet-preflight-validator.js

      - name: Generate safe testnet preflight summary sample
        run: node scripts/generate-testnet-preflight-summary.js test/testnet-preflight-values.sample.json

      - name: Run testnet preflight summary generator self-tests
        run: node scripts/test-testnet-preflight-summary-generator.js

      - name: Run testnet preflight issue parser self-tests
        run: node scripts/test-testnet-preflight-issue-parser.js

      - name: Run testnet preflight review packet builder self-tests
        run: node scripts/test-testnet-preflight-review-packet-builder.js

      - name: Show pre-testnet status
        run: node scripts/show-testnet-preflight-status.js

      - name: Run pre-testnet status self-tests
        run: node scripts/test-testnet-preflight-status.js

      - name: Run preflight tooling checks
        run: node scripts/run-testnet-preflight-tooling-checks.js

      - name: Run preflight tooling check self-tests
        run: node scripts/test-testnet-preflight-tooling-checks.js

      - name: Run testnet preflight e2e packet fixture
        run: node scripts/test-testnet-preflight-e2e-packet.js

      - name: Run preflight safe-output audit
        run: node scripts/audit-testnet-preflight-safe-output.js

      - name: Run preflight safe-output audit self-tests
        run: node scripts/test-testnet-preflight-safe-output-audit.js

      - name: Export safe preflight artifact
        run: node scripts/export-testnet-preflight-safe-artifact.js

      - name: Export pretty safe preflight artifact
        run: node scripts/export-testnet-preflight-safe-artifact.js --pretty

      - name: Run safe preflight artifact exporter self-tests
        run: node scripts/test-testnet-preflight-safe-artifact-exporter.js

      - name: Run safe preflight artifact snapshot self-tests
        run: node scripts/test-testnet-preflight-safe-artifact-snapshot.js

      - name: Check blocked testnet preflight gate
        run: node scripts/check-testnet-preflight-gate.js

      - name: Check blocked testnet preflight gate JSON
        run: node scripts/check-testnet-preflight-gate.js --json

      - name: Run blocked testnet preflight gate self-tests
        run: node scripts/test-testnet-preflight-gate.js

      - name: Run testnet preflight gate safety matrix
        run: node scripts/test-testnet-preflight-gate-safety-matrix.js

      - name: Run safe preflight artifact schema guard
        run: node scripts/test-testnet-preflight-safe-artifact-schema.js

      - name: Build owner preflight handoff packet
        run: node scripts/build-owner-preflight-handoff-packet.js

      - name: Build owner preflight handoff packet JSON
        run: node scripts/build-owner-preflight-handoff-packet.js --json

      - name: Run owner preflight handoff packet self-tests
        run: node scripts/test-owner-preflight-handoff-packet.js

      - name: Run owner preflight handoff packet snapshot guard
        run: node scripts/test-owner-preflight-handoff-packet-snapshot.js

      - name: Run VGC-TOKEN repository safety audit
        run: node scripts/audit-vgc-token-repo-safety.js

      - name: Run VGC-TOKEN repository safety audit JSON
        run: node scripts/audit-vgc-token-repo-safety.js --json

      - name: Run VGC-TOKEN repository safety audit self-tests
        run: node scripts/test-vgc-token-repo-safety-audit.js

      - name: Run VGC-TOKEN repository safety audit snapshot guard
        run: node scripts/test-vgc-token-repo-safety-audit-snapshot.js

      - name: Run VGC-TOKEN source invariant audit
        run: node scripts/audit-vgc-token-source-invariants.js

      - name: Run VGC-TOKEN source invariant audit JSON
        run: node scripts/audit-vgc-token-source-invariants.js --json

      - name: Run VGC-TOKEN source invariant audit self-tests
        run: node scripts/test-vgc-token-source-invariant-audit.js

      - name: Run VGC-TOKEN source invariant audit snapshot guard
        run: node scripts/test-vgc-token-source-invariant-audit-snapshot.js

      - name: Build owner policy decision matrix
        run: node scripts/build-owner-policy-decision-matrix.js

      - name: Build owner policy decision matrix JSON
        run: node scripts/build-owner-policy-decision-matrix.js --json

      - name: Run owner policy decision matrix self-tests
        run: node scripts/test-owner-policy-decision-matrix.js

      - name: Run owner policy decision matrix snapshot guard
        run: node scripts/test-owner-policy-decision-matrix-snapshot.js

      - name: Run owner policy preflight gate
        run: node scripts/check-owner-policy-preflight-gate.js

      - name: Run owner policy preflight gate JSON
        run: node scripts/check-owner-policy-preflight-gate.js --json

      - name: Run owner policy preflight gate self-tests
        run: node scripts/test-owner-policy-preflight-gate.js

      - name: Run owner policy preflight gate snapshot guard
        run: node scripts/test-owner-policy-preflight-gate-snapshot.js

      - name: Build source-of-truth repository decision
        run: node scripts/build-source-of-truth-repository-decision.js

      - name: Build source-of-truth repository decision JSON
        run: node scripts/build-source-of-truth-repository-decision.js --json

      - name: Run source-of-truth repository decision self-tests
        run: node scripts/test-source-of-truth-repository-decision.js

      - name: Run source-of-truth repository decision snapshot guard
        run: node scripts/test-source-of-truth-repository-decision-snapshot.js

      - name: Build deployment readiness blocker registry
        run: node scripts/build-deployment-readiness-blocker-registry.js

      - name: Build deployment readiness blocker registry JSON
        run: node scripts/build-deployment-readiness-blocker-registry.js --json

      - name: Run deployment readiness blocker registry self-tests
        run: node scripts/test-deployment-readiness-blocker-registry.js

      - name: Run deployment readiness blocker registry snapshot guard
        run: node scripts/test-deployment-readiness-blocker-registry-snapshot.js

      - name: Build deployment readiness owner action packet
        run: node scripts/build-deployment-readiness-owner-action-packet.js

      - name: Build deployment readiness owner action packet JSON
        run: node scripts/build-deployment-readiness-owner-action-packet.js --json

      - name: Run deployment readiness owner action packet self-tests
        run: node scripts/test-deployment-readiness-owner-action-packet.js

      - name: Run deployment readiness owner action packet snapshot guard
        run: node scripts/test-deployment-readiness-owner-action-packet-snapshot.js

      - name: Run deployment readiness owner action issue template guard
        run: node scripts/test-deployment-readiness-owner-action-issue-template.js

      - name: Parse deployment readiness owner action issue sample
        run: node scripts/parse-deployment-readiness-owner-action-issue.js test/deployment-readiness-owner-action-issue.sample.md

      - name: Parse deployment readiness owner action issue sample JSON
        run: node scripts/parse-deployment-readiness-owner-action-issue.js test/deployment-readiness-owner-action-issue.sample.md --json

      - name: Run deployment readiness owner action issue parser self-tests
        run: node scripts/test-deployment-readiness-owner-action-issue-parser.js

      - name: Run deployment readiness owner action issue parser snapshot guard
        run: node scripts/test-deployment-readiness-owner-action-issue-parser-snapshot.js

      - name: Build deployment readiness owner action review packet
        run: node scripts/build-deployment-readiness-owner-action-review-packet.js test/deployment-readiness-owner-action-issue.sample.md

      - name: Build deployment readiness owner action review packet JSON
        run: node scripts/build-deployment-readiness-owner-action-review-packet.js test/deployment-readiness-owner-action-issue.sample.md --json

      - name: Run deployment readiness owner action review packet self-tests
        run: node scripts/test-deployment-readiness-owner-action-review-packet.js

      - name: Run deployment readiness owner action review packet snapshot guard
        run: node scripts/test-deployment-readiness-owner-action-review-packet-snapshot.js

      - name: Run deployment readiness owner action intake checks
        run: node scripts/run-deployment-readiness-owner-action-intake-checks.js

      - name: Run deployment readiness owner action intake checks JSON
        run: node scripts/run-deployment-readiness-owner-action-intake-checks.js --json

      - name: Run deployment readiness owner action intake checks self-tests
        run: node scripts/test-deployment-readiness-owner-action-intake-checks.js

      - name: Run deployment readiness owner action intake checks snapshot guard
        run: node scripts/test-deployment-readiness-owner-action-intake-checks-snapshot.js

      - name: Export deployment readiness owner action intake artifact
        run: node scripts/export-deployment-readiness-owner-action-intake-artifact.js

      - name: Export pretty deployment readiness owner action intake artifact
        run: node scripts/export-deployment-readiness-owner-action-intake-artifact.js --pretty

      - name: Run deployment readiness owner action intake artifact self-tests
        run: node scripts/test-deployment-readiness-owner-action-intake-artifact.js

      - name: Run deployment readiness owner action intake artifact snapshot guard
        run: node scripts/test-deployment-readiness-owner-action-intake-artifact-snapshot.js

      - name: Check deployment readiness owner action intake final gate
        run: node scripts/check-deployment-readiness-owner-action-intake-final-gate.js

      - name: Check deployment readiness owner action intake final gate JSON
        run: node scripts/check-deployment-readiness-owner-action-intake-final-gate.js --json

      - name: Run deployment readiness owner action intake final gate self-tests
        run: node scripts/test-deployment-readiness-owner-action-intake-final-gate.js

      - name: Run deployment readiness owner action intake final gate snapshot guard
        run: node scripts/test-deployment-readiness-owner-action-intake-final-gate-snapshot.js

      - name: Run deployment readiness owner action intake runbook guard
        run: node scripts/test-deployment-readiness-owner-action-intake-runbook.js

      - name: Build testnet deployment candidate manifest
        run: node scripts/build-testnet-deployment-candidate-manifest.js

      - name: Build pretty testnet deployment candidate manifest
        run: node scripts/build-testnet-deployment-candidate-manifest.js --pretty

      - name: Run testnet deployment candidate manifest self-tests
        run: node scripts/test-testnet-deployment-candidate-manifest.js

      - name: Validate deploy script inputs without deploying
        working-directory: contracts
        env:
          FUNKY_VALIDATE_ONLY: "true"
          FUNKY_INITIAL_ADMIN: "0x0000000000000000000000000000000000000001"
          FUNKY_INITIAL_FEE_RECIPIENT: "0x0000000000000000000000000000000000000002"
        run: node scripts/deploy-funky.js

      - name: Validate governance configure inputs without transactions
        working-directory: contracts
        env:
          FUNKY_VALIDATE_ONLY: "true"
          FUNKY_TOKEN_ADDRESS: "0x0000000000000000000000000000000000000003"
          FUNKY_TIER_UPDATER: "0x0000000000000000000000000000000000000004"
          FUNKY_TRUSTED_FACTORIES: "0x0000000000000000000000000000000000000005"
          FUNKY_INITIAL_PAIRS: "0x0000000000000000000000000000000000000006"
        run: node scripts/configure-funky-governance.js
