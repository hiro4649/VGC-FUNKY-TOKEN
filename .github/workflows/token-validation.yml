name: Token validation

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  token-validation:
    name: Token validation
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: contracts/package-lock.json

      - name: Install contracts dependencies
        working-directory: contracts
        run: npm ci

      - name: Run contracts tests
        working-directory: contracts
        run: npm test

      - name: Compile contracts
        working-directory: contracts
        run: npm run compile

      - name: Run targeted FunkyRave tests
        working-directory: contracts
        run: npx hardhat test test/FunkyRave.test.js

      - name: Validate testnet preflight owner values sample
        run: node scripts/validate-testnet-preflight-values.js test/testnet-preflight-values.sample.json

      - name: Run testnet preflight owner values validator self-tests
        run: node scripts/test-testnet-preflight-validator.js

      - name: Validate deploy script inputs without deploying
        working-directory: contracts
        env:
          FUNKY_VALIDATE_ONLY: "true"
          FUNKY_INITIAL_ADMIN: "0x0000000000000000000000000000000000000001"
          FUNKY_INITIAL_FEE_RECIPIENT: "0x0000000000000000000000000000000000000002"
        run: node scripts/deploy-funky.js

      - name: Validate governance configure inputs without transactions
        working-directory: contracts
        env:
          FUNKY_VALIDATE_ONLY: "true"
          FUNKY_TOKEN_ADDRESS: "0x0000000000000000000000000000000000000003"
          FUNKY_TIER_UPDATER: "0x0000000000000000000000000000000000000004"
          FUNKY_TRUSTED_FACTORIES: "0x0000000000000000000000000000000000000005"
          FUNKY_INITIAL_PAIRS: "0x0000000000000000000000000000000000000006"
        run: node scripts/configure-funky-governance.js
